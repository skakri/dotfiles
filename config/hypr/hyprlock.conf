# USER
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.28)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 236
    halign = center
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 268, 76
    outline_thickness = 1
    dots_size = 0.18
    dots_spacing = 0.16
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.12)
    inner_color = rgba(255, 255, 255, 0.04)
    capslock_color = rgba(255, 255, 255, 0.55)
    font_color = rgba(255, 255, 255, 0.78)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <span foreground="##ffffff55">password</span>
    hide_input = false
    position = 0, 92
    halign = center
    valign = bottom
}

# Keyboard LAYOUT
label {
    monitor =
    text = $LAYOUT
    color = rgba(255, 255, 255, 0.26)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 58
    halign = center
    valign = bottom
}

# battery information
label {
    monitor =
    text = cmd[update:1000] echo "$($Scripts/Battery.sh)"
    color = rgba(255, 255, 255, 0.24)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 24, 18
    halign = right
    valign = bottom
}

# weather edit the scripts for locations
# weather scripts are located in ~/.config/hypr/UserScripts Weather.sh and/or Weather.py
label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat "$HOME/.cache/.weather_cache"
    color = rgba(255, 255, 255, 0.24)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 24, 18
    halign = left
    valign = bottom
}

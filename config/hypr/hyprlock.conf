# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Hyprlock config for => 2k monitor resolutions                                                         
# Original config submitted by https://github.com/SherLock707

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    # NOTE: use only 1 path
	#path = screenshot   # screenshot of your desktop
	#path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_modified # by wallpaper effects
    # path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current # disabled: no Hyprlock wallpaper
    
    color = rgb(0,0,0) # color will be rendered initially until path is available

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_size = 3
    blur_passes = 0 # disabled: solid-color lock background
    noise = 0.0117
    contrast = 1.3000 # Vibrant!!!
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}


# Date
label {
    monitor =
    text = cmd[update:18000000] echo "$(date +'%A, %-d %B')"
    color = rgba(255, 255, 255, 0.42)
    font_size = 26
    font_family = JetBrainsMono Nerd Font
    position = 0, 8
    halign = center
    valign = center
}

# Hour-Time (single horizontal time like 1080p variant)
label {
    monitor =
#     text = cmd[update:1000] echo "$(date +"%H:%M")"   # 24h option
    text = cmd[update:1000] echo "$(date +"%I:%M %p")" # AM/PM
    color = rgba(255, 255, 255, 0.76)
    font_size = 112
    font_family = JetBrainsMono Nerd Font
    position = 0, -96
    halign = center
    valign = top
}


# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 2
  gaps_in = 2
  gaps_out = 4

  col.active_border = rgba(c0c0c0ff)
  col.inactive_border = rgba(505050aa)
}

decoration {
  rounding = 4
  
  active_opacity = 1.0
  inactive_opacity = 1.0
  fullscreen_opacity = 1.0

  dim_inactive = false
  dim_strength = 0.1
  dim_special = 0.8

  shadow {
    enabled = false
    range = 3
    render_power = 1

    color = rgba(00000000)
    color_inactive = rgba(00000000)
  }

  blur {
    enabled = false
    size = 0
    passes = 0
    new_optimizations = true
    xray = true
    ignore_opacity = true
    special = true
    popups = true
  }
}

group {
  col.border_active = rgba(2e3440ff)

	groupbar {
		col.active = rgba(1e1e2eff)
  }
}
